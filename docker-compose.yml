version: '3.8'
services:
  database:
    image: postgis/postgis
    container_name: securechain_db
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=cadastre_admin
      - POSTGRES_DB=securechain_geodb
    ports:
      - "5432:5432"
    volumes:
      - securechain_data:/var/lib/postgresql/data

volumes:
  securechain_data: